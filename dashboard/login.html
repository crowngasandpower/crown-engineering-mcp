<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Crown Engineering Tools</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2e3b;
      --text: #e1e4eb;
      --text-muted: #8b8fa3;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --red: #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 380px;
      max-width: 90vw;
    }

    .login-card h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .login-card p {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      margin-bottom: 16px;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error {
      color: var(--red);
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="login-card">
  <h1>Crown Engineering Tools</h1>
  <p>Sign in with your Windows credentials</p>

  <div class="error" id="error"></div>

  <form onsubmit="doLogin(event)">
    <label>Username</label>
    <input type="text" id="username" placeholder="e.g. paul.berry-briggs" autofocus required>

    <label>Password</label>
    <input type="password" id="password" required>

    <button class="btn" type="submit" id="loginBtn">Sign In</button>
  </form>
</div>

<script>
  // If already logged in, redirect
  fetch('/auth/me').then(r => { if (r.ok) window.location.href = '/'; });

  async function doLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const error = document.getElementById('error');
    error.style.display = 'none';
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Signing in...';

    try {
      const resp = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value,
        }),
      });

      if (resp.ok) {
        window.location.href = '/';
      } else {
        const data = await resp.json();
        error.textContent = data.detail || 'Login failed';
        error.style.display = 'block';
      }
    } catch (err) {
      error.textContent = 'Connection error — is the server reachable?';
      error.style.display = 'block';
    }

    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
</script>

</body>
</html>
