<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crown Engineering Tools</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #222632;
      --border: #2a2e3b;
      --text: #e1e4eb;
      --text-muted: #8b8fa3;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --green: #22c55e;
      --blue: #3b82f6;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 26px;
      font-weight: 600;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 48px 40px;
    }

    .tools-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .tool-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      text-decoration: none;
      color: var(--text);
      transition: all 0.15s;
    }

    .tool-card:hover {
      border-color: var(--accent);
      background: var(--surface-hover);
      transform: translateY(-2px);
    }

    .tool-card .icon {
      font-size: 32px;
      margin-bottom: 16px;
    }

    .tool-card h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .tool-card p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 13px;
    }
  </style>
</head>
<body>

<header>
  <h1>Crown Engineering Tools</h1>
  <span class="subtitle">Crown Gas & Power</span>
</header>

<div class="container">
  <div class="tools-grid">
    <a href="/flags.html" class="tool-card">
      <div class="icon">&#127988;</div>
      <h2>Feature Flags</h2>
      <p>View and toggle Unleash feature flags across development, UAT, and production environments.</p>
    </a>
    <a href="/deployments.html" class="tool-card">
      <div class="icon">&#128640;</div>
      <h2>Production Deployments</h2>
      <p>Deploy apps to preview, promote to live, or rollback to the previous release.</p>
    </a>
  </div>
</div>

</body>
</html>
