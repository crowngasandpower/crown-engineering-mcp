server {
    listen 3000;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the static dashboard
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* to the unleash-api service (strips /api prefix).
    # Use a variable so nginx re-resolves DNS on each request instead of
    # caching the IP at config-load time (prevents stale IPs after
    # container recreates).
    resolver 127.0.0.11 valid=10s;
    set $unleash_backend http://unleash-api:3000;

    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $unleash_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy /jenkins/* to the Jenkins server (LDAP auth handled by Jenkins)
    # Engineers must be logged into Jenkins via their LDAP credentials.
    # The proxy passes through the browser's session cookie.
    location /jenkins/ {
        proxy_pass http://host.docker.internal:8090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass_header Set-Cookie;
    }

    # Proxy /github/* to the GitHub API (with auth token from env)
    location /github/ {
        rewrite ^/github/(.*) /$1 break;
        proxy_pass https://api.github.com;
        proxy_set_header Host api.github.com;
        proxy_set_header Accept "application/vnd.github+json";
        proxy_set_header Authorization "Bearer ${GITHUB_TOKEN}";
        proxy_ssl_server_name on;
    }
}
