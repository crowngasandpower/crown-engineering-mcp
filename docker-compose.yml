name: crown-engineering-mcp

services:
  postgres:
    image: postgres:16-alpine
    container_name: crown-mcp-postgres
    environment:
      POSTGRES_USER: codereview
      POSTGRES_PASSWORD: codereview
      POSTGRES_DB: codereview
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "9504:5432"
    restart: unless-stopped

  postgrest:
    image: postgrest/postgrest:latest
    container_name: crown-mcp-postgrest
    environment:
      PGRST_DB_URI: postgres://codereview:codereview@postgres:5432/codereview
      PGRST_DB_ANON_ROLE: codereview
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:9505
    ports:
      - "9505:3000"
    depends_on:
      - postgres
    restart: unless-stopped

  review-api:
    build: ./review/api
    container_name: crown-mcp-review-api
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_MODEL: claude-sonnet-4-6
    ports:
      - "9506:3000"
    restart: unless-stopped

  unleash-api:
    build: ./unleash/api
    container_name: crown-mcp-unleash-api
    environment:
      UNLEASH_BASE_URL: ${UNLEASH_BASE_URL:-https://eu.app.getunleash.io/eull0051}
      UNLEASH_PROJECT: ${UNLEASH_PROJECT:-core-products}
      UNLEASH_ADMIN_TOKEN: ${UNLEASH_ADMIN_TOKEN}
      JIRA_BASE_URL: ${JIRA_BASE_URL:-https://crowngasandpower-team-delivery.atlassian.net}
      JIRA_EMAIL: ${JIRA_EMAIL:-}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN:-}
    ports:
      - "9511:3000"
    restart: unless-stopped

  dashboard-api:
    build: ./dashboard/api
    container_name: crown-mcp-dashboard-api
    environment:
      LDAP_SERVER: ${LDAP_SERVER:-192.168.164.223}
      LDAP_PORT: ${LDAP_PORT:-389}
      LDAP_DOMAIN: ${LDAP_DOMAIN:-crowngp.local}
      LDAP_BASE_DN: ${LDAP_BASE_DN:-DC=crowngp,DC=local}
      ENGINEER_GROUP_DN: ${ENGINEER_GROUP_DN:-CN=Dev-Env-Access,OU=Security Groups,DC=crowngp,DC=local}
      UNLEASH_API_URL: http://unleash-api:3000
      JENKINS_BASE_URL: http://host.docker.internal:8090
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_ORG: crowngasandpower
      INITIAL_ADMIN: paul.berry-briggs
      DB_PATH: /app/data/dashboard.db
    volumes:
      - ./data/dashboard-api:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9514:3000"
    depends_on:
      - unleash-api
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    container_name: crown-mcp-dashboard
    ports:
      - "9512:3000"
    depends_on:
      - dashboard-api
    restart: unless-stopped

  bugs-api:
    build: ./bugs/api
    container_name: crown-mcp-bugs-api
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-haiku-4-5-20251001}
      JIRA_BASE_URL: ${JIRA_BASE_URL:-https://crowngasandpower-team-delivery.atlassian.net}
      JIRA_EMAIL: ${JIRA_EMAIL:-}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN:-}
      JIRA_PROJECT: ${JIRA_PROJECT:-CT}
    ports:
      - "9513:3000"
    restart: unless-stopped

  mcp-server:
    build: ./mcp-server
    container_name: crown-mcp-server
    environment:
      REVIEW_API_URL: http://review-api:3000
      UNLEASH_API_URL: http://unleash-api:3000
      BUGS_API_URL: http://bugs-api:3000
    ports:
      - "9510:3000"
    depends_on:
      - review-api
      - unleash-api
      - bugs-api
    restart: unless-stopped
